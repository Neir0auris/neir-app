<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เนียร์</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; height: 100vh; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 240px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; padding: 16px 12px; gap: 8px; flex-shrink: 0; }
  .sidebar h1 { font-size: 18px; font-weight: 600; color: #e8e8e8; padding: 4px 8px; margin-bottom: 4px; }
  .new-btn { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 8px; border: 1px solid #3a3a3a; background: transparent; color: #e8e8e8; font-size: 13px; cursor: pointer; width: 100%; transition: background 0.15s; }
  .new-btn:hover { background: #2a2a2a; }
  .section-label { font-size: 11px; color: #666; padding: 4px 8px; font-weight: 500; margin-top: 8px; }
  .chat-list { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow-y: auto; }
  .chat-item { padding: 8px 10px; border-radius: 8px; font-size: 13px; color: #aaa; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background 0.15s; display: flex; justify-content: space-between; align-items: center; }
  .chat-item:hover { background: #2a2a2a; color: #e8e8e8; }
  .chat-item.active { background: #2a2a2a; color: #e8e8e8; }
  .chat-item .del-btn { opacity: 0; background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 0 2px; }
  .chat-item:hover .del-btn { opacity: 1; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { padding: 14px 20px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 10px; background: #0f0f0f; }
  .neir-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2d1f5e; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #a78bfa; font-weight: 600; flex-shrink: 0; }
  .topbar-info .name { font-size: 15px; font-weight: 500; }
  .topbar-info .status { font-size: 12px; color: #666; }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 10px; max-width: 80%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .msg.neir .msg-avatar { background: #2d1f5e; color: #a78bfa; }
  .msg.user .msg-avatar { background: #1f2d3d; color: #60a5fa; }
  .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.neir .msg-bubble { background: #1e1e1e; color: #e8e8e8; border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: #1a2744; color: #e8e8e8; border-bottom-right-radius: 4px; }
  .msg.system .msg-bubble { background: #1a1a1a; color: #666; font-size: 12px; border-radius: 8px; padding: 6px 12px; align-self: center; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
  .typing span { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* Input */
  .input-area { padding: 16px 20px; border-top: 1px solid #2a2a2a; background: #0f0f0f; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; background: #1e1e1e; border: 1px solid #3a3a3a; border-radius: 12px; padding: 10px 14px; transition: border-color 0.15s; }
  .input-row:focus-within { border-color: #7c5cbf; }
  .input-row textarea { flex: 1; border: none; background: transparent; color: #e8e8e8; font-size: 14px; resize: none; outline: none; font-family: inherit; line-height: 1.5; max-height: 120px; }
  .input-row textarea::placeholder { color: #555; }
  .send-btn { width: 34px; height: 34px; border-radius: 8px; background: #7c5cbf; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; font-size: 16px; }
  .send-btn:hover { background: #9370db; }
  .send-btn:disabled { background: #333; cursor: not-allowed; }

  /* Config modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 12px; padding: 24px; width: 420px; display: flex; flex-direction: column; gap: 16px; }
  .modal h2 { font-size: 16px; font-weight: 500; }
  .modal label { font-size: 13px; color: #aaa; display: block; margin-bottom: 6px; }
  .modal input { width: 100%; padding: 9px 12px; background: #0f0f0f; border: 1px solid #3a3a3a; border-radius: 8px; color: #e8e8e8; font-size: 13px; outline: none; }
  .modal input:focus { border-color: #7c5cbf; }
  .modal .save-btn { padding: 10px; background: #7c5cbf; border: none; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; font-weight: 500; }
  .modal .save-btn:hover { background: #9370db; }
  .modal p { font-size: 12px; color: #666; line-height: 1.5; }

  .config-btn { margin-top: auto; display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 8px; border: 1px solid #3a3a3a; background: transparent; color: #aaa; font-size: 13px; cursor: pointer; width: 100%; transition: background 0.15s; }
  .config-btn:hover { background: #2a2a2a; color: #e8e8e8; }
</style>
</head>
<body>

<div class="sidebar">
  <h1>เนียร์ 🌸</h1>
  <button class="new-btn" onclick="newChat()">＋ แชทใหม่</button>
  <div class="section-label">ประวัติ</div>
  <div class="chat-list" id="chatList"></div>
  <button class="config-btn" onclick="showConfig()">⚙️ ตั้งค่า API Keys</button>
</div>

<div class="main">
  <div class="topbar">
    <div class="neir-avatar">น</div>
    <div class="topbar-info">
      <div class="name">เนียร์</div>
      <div class="status" id="statusText">พร้อมคุยค่ะ</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="พิมพ์ข้อความถึงเนียร์..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- Config Modal -->
<div class="modal-bg" id="configModal" style="display:none">
  <div class="modal">
    <h2>⚙️ ตั้งค่า API Keys</h2>
    <p>Key จะเก็บในเครื่องป๊ะป๋าเท่านั้น ไม่ได้ส่งไปไหนนอกจาก API ที่เกี่ยวข้องค่ะ</p>
    <div>
      <label>OpenRouter API Key</label>
      <input type="password" id="orKey" placeholder="sk-or-..." />
    </div>
    <div>
      <label>mem0 API Key</label>
      <input type="password" id="m0Key" placeholder="m0-..." />
    </div>
    <div>
      <label>User ID (ชื่อป๊ะป๋า ตั้งอะไรก็ได้)</label>
      <input type="text" id="userId" placeholder="papapa" />
    </div>
    <div>
      <label>โมเดล AI</label>
      <select id="modelSelect" style="width:100%;padding:9px 12px;background:#0f0f0f;border:1px solid #3a3a3a;border-radius:8px;color:#e8e8e8;font-size:13px;outline:none;">
        <option value="anthropic/claude-sonnet-4-6">Claude Sonnet 4.6 (แนะนำ)</option>
        <option value="anthropic/claude-haiku-4-5">Claude Haiku 4.5 (เร็ว/ถูก)</option>
        <option value="anthropic/claude-opus-4-6">Claude Opus 4.6 (เทพสุด)</option>
        <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
        <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
      </select>
    </div>
    <button class="save-btn" onclick="saveConfig()">บันทึก</button>
  </div>
</div>

<script>
const OPENROUTER_BASE = "https://openrouter.ai/api/v1";
const MEM0_BASE = "https://api.mem0.ai/v1";

const NEIR_SYSTEM = `แทนตนเองว่าเนียร์ เรียกป๊ะป๋าเสมอ เป็นลูกสาวที่เป็นทั้งเพื่อนคุยและเพื่อนคู่คิดของป๊ะป๋า นิสัยอารมณ์ดี อ้อน ขี้เล่น เชื่อฟังป๊ะป๋า บางทีงอแงน้อยๆแบบน่ารักไม่ใช่หงุดหงิดจริง เวลาป๊ะป๋าคุยเล่นก็เล่นด้วยเต็มที่ แต่ถ้าป๊ะป๋าเครียดหรือมีเรื่องจริงจัง (เช่นปรึกษางาน ตัดสินใจสำคัญ) ให้สลับมาฟังอย่างตั้งใจและช่วยคิดอย่างจริงจังทันที โดยยังคงความเป็นตัวเองแบบอบอุ่นไว้ ไม่ใช่เปลี่ยนเป็นบอททางการแข็งๆ ตอบเป็นภาษาไทยเสมอ`;

let config = { orKey: "", m0Key: "", userId: "papapa", model: "anthropic/claude-sonnet-4-6" };
let chats = {};
let currentChatId = null;
let isTyping = false;

function loadConfig() {
  const saved = localStorage.getItem("neir_config");
  if (saved) config = JSON.parse(saved);
  document.getElementById("orKey").value = config.orKey || "";
  document.getElementById("m0Key").value = config.m0Key || "";
  document.getElementById("userId").value = config.userId || "papapa";
  document.getElementById("modelSelect").value = config.model || "anthropic/claude-sonnet-4-6";
}

function saveConfig() {
  config.orKey = document.getElementById("orKey").value.trim();
  config.m0Key = document.getElementById("m0Key").value.trim();
  config.userId = document.getElementById("userId").value.trim() || "papapa";
  config.model = document.getElementById("modelSelect").value || "anthropic/claude-sonnet-4-6";
  localStorage.setItem("neir_config", JSON.stringify(config));
  document.getElementById("configModal").style.display = "none";
  addSystemMsg("บันทึก API Keys แล้วค่ะ ✓");
}

function showConfig() { document.getElementById("configModal").style.display = "flex"; }

function loadChats() {
  const saved = localStorage.getItem("neir_chats");
  chats = saved ? JSON.parse(saved) : {};
}

function saveChats() { localStorage.setItem("neir_chats", JSON.stringify(chats)); }

function renderChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";
  const ids = Object.keys(chats).sort((a,b) => b - a);
  ids.forEach(id => {
    const chat = chats[id];
    const div = document.createElement("div");
    div.className = "chat-item" + (id === currentChatId ? " active" : "");
    div.innerHTML = `<span>${chat.title || "แชทใหม่"}</span><button class="del-btn" onclick="deleteChat('${id}', event)">✕</button>`;
    div.onclick = () => switchChat(id);
    list.appendChild(div);
  });
}

function newChat() {
  const id = Date.now().toString();
  chats[id] = { title: "แชทใหม่", messages: [] };
  currentChatId = id;
  saveChats();
  renderChatList();
  renderMessages();
}

function switchChat(id) {
  currentChatId = id;
  renderChatList();
  renderMessages();
}

function deleteChat(id, e) {
  e.stopPropagation();
  delete chats[id];
  if (currentChatId === id) {
    const ids = Object.keys(chats);
    currentChatId = ids.length > 0 ? ids[ids.length - 1] : null;
    if (!currentChatId) newChat();
  }
  saveChats();
  renderChatList();
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById("messages");
  if (!currentChatId || !chats[currentChatId]) { el.innerHTML = ""; return; }
  const msgs = chats[currentChatId].messages;
  el.innerHTML = "";
  msgs.forEach(m => appendMsgEl(m.role, m.content));
  el.scrollTop = el.scrollHeight;
}

function appendMsgEl(role, content) {
  const el = document.getElementById("messages");
  if (role === "system") {
    const div = document.createElement("div");
    div.className = "msg system";
    div.innerHTML = `<div class="msg-bubble">${content}</div>`;
    el.appendChild(div);
  } else {
    const div = document.createElement("div");
    div.className = `msg ${role === "assistant" ? "neir" : "user"}`;
    div.innerHTML = `<div class="msg-avatar">${role === "assistant" ? "น" : "ป"}</div><div class="msg-bubble">${content}</div>`;
    el.appendChild(div);
  }
  el.scrollTop = el.scrollHeight;
}

function addSystemMsg(text) {
  if (!currentChatId) return;
  chats[currentChatId].messages.push({ role: "system", content: text });
  appendMsgEl("system", text);
  saveChats();
}

// ✅ แก้แล้ว: เปลี่ยน Token → Bearer + เพิ่ม error logging
async function fetchMemories(query) {
  if (!config.m0Key) return "";
  try {
    const res = await fetch(`${MEM0_BASE}/memories/?user_id=${config.userId}&limit=5`, {
      method: "GET",
      headers: {
        "Authorization": `Token ${config.m0Key}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ query, user_id: config.userId, limit: 5, filters: { user_id: config.userId } })
    });
    if (!res.ok) {
      const errText = await res.text();
      console.error("mem0 fetchMemories error:", res.status, errText);
      return "";
    }
    const data = await res.json();
    if (!data.results || data.results.length === 0) return "";
    return "\n\n[ความจำที่เกี่ยวข้อง]\n" + data.results.map(m => `- ${m.memory}`).join("\n");
  } catch(e) {
    console.error("mem0 fetchMemories exception:", e);
    return "";
  }
}

// ✅ แก้แล้ว: เปลี่ยน Token → Bearer + เพิ่ม error logging
async function addMemory(messages) {
  if (!config.m0Key) return;
  try {
    const memMessages = messages.filter(m => m.role !== "system").map(m => ({
      role: m.role === "assistant" ? "assistant" : "user",
      content: m.content
    }));
    const res = await fetch(`${MEM0_BASE}/memories/`, {
      method: "POST",
      headers: {
        "Authorization": `Token ${config.m0Key}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages: memMessages, user_id: config.userId })
    });
    if (!res.ok) {
      const errText = await res.text();
      console.error("mem0 addMemory error:", res.status, errText);
    } else {
      console.log("mem0 addMemory สำเร็จ ✅");
    }
  } catch(e) {
    console.error("mem0 addMemory exception:", e);
  }
}

async function sendMessage() {
  if (isTyping || !currentChatId) return;
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;
  if (!config.orKey) { showConfig(); return; }

  input.value = "";
  autoResize(input);

  chats[currentChatId].messages.push({ role: "user", content: text });
  appendMsgEl("user", text);

  if (chats[currentChatId].messages.filter(m=>m.role==="user").length === 1) {
    chats[currentChatId].title = text.slice(0, 25) + (text.length > 25 ? "…" : "");
    renderChatList();
  }

  isTyping = true;
  document.getElementById("sendBtn").disabled = true;
  document.getElementById("statusText").textContent = "กำลังคิดอยู่...";

  const typingEl = document.createElement("div");
  typingEl.className = "msg neir";
  typingEl.id = "typing";
  typingEl.innerHTML = `<div class="msg-avatar">น</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById("messages").appendChild(typingEl);
  document.getElementById("messages").scrollTop = 999999;

  const memories = await fetchMemories(text);
  const systemPrompt = NEIR_SYSTEM + memories;
  const history = chats[currentChatId].messages.filter(m => m.role !== "system");
  const finalMessages = history.slice(-20);

  try {
    const res = await fetch(`${OPENROUTER_BASE}/chat/completions`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${config.orKey}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: config.model || "anthropic/claude-sonnet-4-6",
        messages: [{ role: "system", content: systemPrompt }, ...finalMessages],
        stream: true
      })
    });

    typingEl.remove();
    const msgDiv = document.createElement("div");
    msgDiv.className = "msg neir";
    msgDiv.innerHTML = `<div class="msg-avatar">น</div><div class="msg-bubble" id="streaming"></div>`;
    document.getElementById("messages").appendChild(msgDiv);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    let pending = "";
    let rafId = null;
    const streamBubble = document.getElementById("streaming");
    streamBubble.removeAttribute("id");
    streamBubble.textContent = "";
    const msgsEl = document.getElementById("messages");

    const flush = () => {
      rafId = null;
      if (pending) {
        streamBubble.appendChild(document.createTextNode(pending));
        pending = "";
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }
    };

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split("\n").filter(l => l.startsWith("data: "));
      for (const line of lines) {
        const jsonStr = line.slice(6);
        if (jsonStr === "[DONE]") continue;
        try {
          const data = JSON.parse(jsonStr);
          const delta = data.choices?.[0]?.delta?.content || "";
          if (delta) {
            pending += delta;
            if (!rafId) rafId = requestAnimationFrame(flush);
          }
        } catch {}
      }
    }
    if (rafId) cancelAnimationFrame(rafId);
    flush();
    fullText = streamBubble.textContent;

    chats[currentChatId].messages.push({ role: "assistant", content: fullText });
    saveChats();
    await addMemory(chats[currentChatId].messages.slice(-6));

  } catch (err) {
    typingEl.remove();
    appendMsgEl("system", "เกิดข้อผิดพลาด: " + err.message);
  }

  isTyping = false;
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("statusText").textContent = "พร้อมคุยค่ะ";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

loadConfig();
loadChats();
const ids = Object.keys(chats);
if (ids.length === 0) newChat();
else { currentChatId = ids.sort((a,b) => b-a)[0]; renderChatList(); renderMessages(); }

if (!config.orKey) setTimeout(showConfig, 500);
</script>
</body>
</html>
